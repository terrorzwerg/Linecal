<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linienkalender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        #kalender {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 280px;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            color: #666;
            font-size: 18px;
        }
        .day {
            text-align: left;
        }
        .dot {
            text-align: center;
        }
        .date {
            text-align: right;
        }
        .row.highlight {
            color: #d00000;
            font-weight: 700;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <h1>Linienkalender</h1>
    <div id="kalender">Wird geladen...</div>
    <script>
        // URL zu deiner JSON-Datei bei GitHub Pages
        const jsonUrl = "https://terrorzwerg.github.io/Linecal/linienkalender.json";

        async function loadKalender() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error("Fehler beim Laden der JSON-Daten.");
                const data = await response.json();

                const kalenderElement = document.getElementById("kalender");
                kalenderElement.innerHTML = ""; // Vorherigen Inhalt löschen

                data.timeline.forEach(entry => {
                    const row = document.createElement("div");
                    row.className = `row${entry.highlight ? " highlight" : ""}`;
                    row.innerHTML = `
                        <span class="day">${entry.tag}</span>
                        <span class="dot">•</span>
                        <span class="date">${entry.datum}</span>
                    `;
                    kalenderElement.appendChild(row);
                });
            } catch (error) {
                console.error("Fehler:", error);
                document.getElementById("kalender").textContent = "Fehler beim Laden des Kalenders.";
            }
        }

        // Kalender laden
        loadKalender();
    </script>
</body>
</html>
