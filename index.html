<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linienkalender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        #kalender {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            max-width: 900px;
        }
        .days {
            text-align: left;
            color: #666;
        }
        .separator {
            text-align: center;
            color: #666;
        }
        .dates {
            text-align: right;
            color: #666;
        }
        .highlight {
            color: #d00000;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Linienkalender</h1>
    <div id="kalender">Wird geladen...</div>
    <script>
        // URL zu deiner JSON-Datei bei GitHub Pages
        const jsonUrl = "https://terrorzwerg.github.io/Linecal/linienkalender.json";

        async function loadKalender() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error("Fehler beim Laden der JSON-Daten.");
                const data = await response.json();

                const kalenderElement = document.getElementById("kalender");
                kalenderElement.innerHTML = ""; // Vorherigen Inhalt löschen

                const days = data.timeline
                    .map(entry => `<span class="${entry.highlight ? "highlight" : ""}">${entry.tag}</span>`)
                    .join(" ");
                const dates = data.timeline
                    .map(entry => `<span class="${entry.highlight ? "highlight" : ""}">${entry.datum}</span>`)
                    .join(" ");

                kalenderElement.innerHTML = `
                    <div class="days">${days}</div>
                    <div class="separator">•</div>
                    <div class="dates">${dates}</div>
                `;
            } catch (error) {
                console.error("Fehler:", error);
                document.getElementById("kalender").textContent = "Fehler beim Laden des Kalenders.";
            }
        }

        // Kalender laden
        loadKalender();
    </script>
</body>
</html>
